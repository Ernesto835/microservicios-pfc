worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # --- REQUERIMIENTO UTEQ: LOGGING DE PETICIONES ---
    # Registra de forma legible: timestamp, método, ruta, IP, código de respuesta y latencias
    log_format microservices_log '$time_local - IP: $remote_addr | '
                                 'Método: $request_method | Ruta: $request_uri | '
                                 'Código Respuesta: $status | Latencia: $request_time s';

    access_log /var/log/nginx/access.log microservices_log;

    # --- REQUERIMIENTO UTEQ: RATE LIMITING ---
    # Máximo 100 peticiones por minuto por dirección IP (100r/m) para mitigar ataques DOS
    limit_req_zone $binary_remote_addr zone=api_limit_zone:10m rate=100r/m;

    # --- RESOLUCIÓN DE ENRUTAMIENTO MEDIANTE DNS INTERNO DE DOCKER ---
    upstream auth_backend {
        server auth-service:8001;
    }

    upstream resource_backend {
        server resource-service:8002;
    }

    upstream notification_backend {
        server notification-service:8003;
    }

    server {
        # --- REQUERIMIENTO UTEQ: ESCUCHAR EN PUERTO INTERMEDIO 8080 ---
        listen 8080;
        server_name localhost;

        # Aplicar el límite de peticiones de forma perimetral con margen de ráfaga
        limit_req zone=api_limit_zone burst=20 nodelay;

        # Cabeceras globales para resolver políticas de intercambio de recursos (CORS)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        # Responder de inmediato a las peticiones previas de control (Preflight CORS)
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # --- ENRUTAMIENTO CONFIGURADO Y ALINEADO CON LAS RUTAS BASE ---
        
        # 1. Mapeo de Seguridad y Usuarios -> auth-service
        location /api/auth/ {
            proxy_pass http://auth_backend/; # <- Barra final clave: Transforma '/api/auth/register' en '/register'
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Mapeo de Core de Negocio (Préstamos) -> resource-service
        location /api/resources/ {
            proxy_pass http://resource_backend/; # <- Barra final clave: Mantiene la compatibilidad CRUD limpia
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Mapeo de Trazabilidad y Eventos -> notification-service
        location /api/notifications/ {
            proxy_pass http://notification_backend/; # <- Barra final clave: Limpia prefijos para FastAPI de auditoría
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}